<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ClearSky &middot; How Your Meter Earns</title>
<style>
  :root{
    --bg:#0a0e1a; --panel:#111827; --panel2:#0f1626; --line:#1f2b42;
    --ink:#e8eef8; --mut:#8ea2c0; --dim:#5f7196;
    --cyan:#38e1ff; --grn:#31e6a8; --amber:#ffb838; --vio:#8b7bff;
    --shadow:0 12px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  header{padding:18px 20px 10px;text-align:center;position:relative;}
  .logo{font-weight:800;letter-spacing:.5px;font-size:15px;}
  .logo b{color:var(--cyan);}
  .sub{color:var(--mut);font-size:11px;margin-top:2px;letter-spacing:.4px;}
  .progress{display:flex;gap:6px;justify-content:center;padding:14px 20px 4px;}
  .dot{width:26px;height:4px;border-radius:3px;background:var(--line);transition:background .3s;}
  .dot.on{background:var(--cyan);}
  .dot.done{background:var(--grn);}
  .stage{flex:1;padding:8px 20px 20px;}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:20px;padding:24px 20px;box-shadow:var(--shadow);
    animation:pop .35s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .step-tag{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);}
  h1{font-size:22px;margin:8px 0 6px;line-height:1.2;}
  .lead{color:var(--mut);font-size:14px;line-height:1.5;margin:0 0 8px;}

  /* device / meter visual */
  .device{margin:22px auto 8px;width:220px;background:#060a14;border:1px solid #24344f;
    border-radius:22px;padding:16px;text-align:center;box-shadow:inset 0 0 30px rgba(56,225,255,.06);}
  .device .screen{background:#02060d;border:1px solid #1c2b45;border-radius:12px;padding:14px 10px;}
  .device .label{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
  .device .val{font-size:40px;font-weight:800;color:var(--cyan);line-height:1;margin:6px 0 2px;
    font-variant-numeric:tabular-nums;text-shadow:0 0 18px rgba(56,225,255,.35);}
  .device .unit{font-size:12px;color:var(--mut);}
  .pmrow{display:flex;gap:14px;justify-content:center;margin-top:16px;}
  .pm{width:62px;height:62px;border-radius:50%;border:1px solid #2b3d5c;background:#0d1626;
    color:var(--ink);font-size:30px;font-weight:700;cursor:pointer;user-select:none;
    display:flex;align-items:center;justify-content:center;transition:transform .08s,background .15s;}
  .pm:active{transform:scale(.9);background:#16233b;}
  .pm.plus{color:var(--grn);border-color:#1f5a45;}
  .pm.minus{color:var(--amber);border-color:#5a4620;}
  .hint{font-size:12px;color:var(--dim);text-align:center;margin-top:10px;}
  .readout{background:#0c1424;border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:18px;}
  .rrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;}
  .rrow .k{color:var(--mut);} .rrow .v{font-weight:700;}
  .rrow .v.g{color:var(--grn);} .rrow .v.c{color:var(--cyan);} .rrow .v.a{color:var(--amber);}
  .divider{height:1px;background:var(--line);margin:6px 0;}

  /* node attach animation */
  .flow{display:flex;flex-direction:column;align-items:center;gap:0;margin:20px 0 6px;}
  .node{width:100%;max-width:300px;background:#0c1424;border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;position:relative;}
  .node .ico{width:44px;height:44px;border-radius:12px;flex:0 0 44px;display:flex;
    align-items:center;justify-content:center;font-size:22px;}
  .node .nm{font-weight:700;font-size:14px;} .node .ds{font-size:11px;color:var(--mut);}
  .node.b .ico{background:rgba(49,230,168,.12);border:1px solid #1f5a45;}
  .node.a .ico{background:rgba(139,123,255,.14);border:1px solid #40396e;}
  .node.m .ico{background:rgba(56,225,255,.12);border:1px solid #1d4f66;}
  .link{width:2px;height:22px;background:linear-gradient(180deg,var(--grn),var(--vio));position:relative;}
  .link.pulse:after{content:"";position:absolute;left:-3px;width:8px;height:8px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:drop 1.1s linear infinite;}
  @keyframes drop{from{top:-4px;opacity:0;}20%{opacity:1;}to{top:22px;opacity:0;}}
  .attach-btn{margin-top:6px;}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
    letter-spacing:.5px;}
  .badge.live{background:rgba(49,230,168,.15);color:var(--grn);}
  .badge.wait{background:rgba(255,184,56,.15);color:var(--amber);}

  /* marketplace ticker */
  .mkt{margin-top:16px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#0b1220;}
  .mkt .head{padding:10px 14px;font-size:12px;color:var(--mut);border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;}
  .mkt .row{display:flex;justify-content:space-between;padding:10px 14px;font-size:13px;
    border-bottom:1px solid #131d30;animation:pop .3s ease;}
  .mkt .row:last-child{border-bottom:0;}
  .mkt .buyer{color:var(--ink);font-weight:600;} .mkt .amt{color:var(--grn);font-weight:700;}

  /* ACH card */
  .ach{margin-top:18px;background:linear-gradient(135deg,#0e2a24,#0b1a2e);
    border:1px solid #1f5a45;border-radius:18px;padding:20px;text-align:center;position:relative;overflow:hidden;}
  .ach .chk{width:56px;height:56px;border-radius:50%;background:var(--grn);color:#04140d;
    font-size:32px;font-weight:800;display:flex;align-items:center;justify-content:center;
    margin:0 auto 12px;animation:pop .4s ease;}
  .ach .big{font-size:34px;font-weight:800;color:var(--grn);text-shadow:0 0 20px rgba(49,230,168,.3);}
  .ach .to{color:var(--mut);font-size:13px;margin-top:4px;}
  .ach .bank{margin-top:14px;background:rgba(0,0,0,.3);border:1px solid #163e30;border-radius:12px;
    padding:12px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left;}
  .ach .bank .bk{font-weight:700;font-size:14px;} .ach .bank .ac{font-size:12px;color:var(--mut);}
  .ach .st{font-size:11px;color:var(--grn);letter-spacing:.5px;margin-top:12px;}

  nav{padding:14px 20px 26px;display:flex;gap:12px;}
  .btn{flex:1;border:0;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;
    transition:transform .08s,opacity .15s;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--cyan);color:#04121a;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut);flex:0 0 96px;}
  .btn.grn{background:var(--grn);color:#04140d;}
  .btn:disabled{opacity:.4;}
  .foot{text-align:center;font-size:10px;color:var(--dim);padding:0 20px 18px;line-height:1.5;}
  .est{font-size:11px;color:var(--dim);text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><b>ClearSky</b> &middot; Your Meter, Working For You</div>
    <div class="sub">BATTERY &rarr; AI NODE &rarr; COMPUTE MARKETPLACE &rarr; YOUR BANK</div>
  </header>

  <div class="progress" id="prog"></div>
  <div class="stage" id="stage"></div>

  <nav id="nav"></nav>
  <div class="foot">
    Illustrative walkthrough. Payouts vary by utility program, market compute demand, and unit usage.<br>
    ClearSky Energy Solutions &middot; Molecule Systems &middot; Armada AI
  </div>
</div>

<script>
/* ES5 only — no arrow fns, no template literals, no optional chaining (iOS Safari safe) */
var STATE = { step:0, kwh:900, attached:false, marketTicks:0 };
var RATE = { arb:0.11, vpp:150, computePerKwh:0.34 }; // illustrative

function usd(n){ return "$" + (Math.round(n*100)/100).toFixed(2); }
function usd0(n){ return "$" + Math.round(n).toLocaleString(); }

/* ---- earnings math (illustrative, tied to deck's 13kWh + GPU node story) ---- */
function calc(){
  var kwh = STATE.kwh;
  // "excess" the battery can cycle for grid + surplus energy the node monetizes
  var excessKwhMo = Math.max(0, kwh * 0.28);         // portion cycled to grid/compute
  var energyArb   = excessKwhMo * RATE.arb;           // arbitrage on cycled kWh
  var vpp         = RATE.vpp / 12;                    // capacity payment /mo
  var compute     = excessKwhMo * RATE.computePerKwh; // AI node compute revenue
  var total       = energyArb + vpp + compute;
  return {
    excess: excessKwhMo,
    energyArb: energyArb,
    vpp: vpp,
    compute: compute,
    total: total
  };
}

var BUYERS = [
  ["Inference cluster \u2014 LLM batch", 0.42],
  ["Image gen render queue", 0.31],
  ["Telco edge \u2014 5G workload", 0.27],
  ["Gaming \u2014 cloud frames", 0.19],
  ["Startup fine-tune job", 0.36]
];

function el(html){ var d=document.createElement("div"); d.innerHTML=html; return d.firstChild; }

function renderProgress(){
  var p=document.getElementById("prog"); p.innerHTML="";
  for(var i=0;i<4;i++){
    var c="dot"; if(i<STATE.step)c+=" done"; else if(i===STATE.step)c+=" on";
    p.appendChild(el('<div class="'+c+'"></div>'));
  }
}

function stepMeter(){
  var c=calc();
  return ''+
  '<div class="card">'+
    '<div class="step-tag">Step 1 of 4</div>'+
    '<h1>How much power do you use?</h1>'+
    '<p class="lead">A 13\u00a0kWh ClearSky battery sits behind your meter. Tap plus or minus to set your typical monthly usage \u2014 this tells the system how much room there is to earn.</p>'+
    '<div class="device">'+
      '<div class="screen">'+
        '<div class="label">Monthly Usage</div>'+
        '<div class="val" id="kwhVal">'+STATE.kwh+'</div>'+
        '<div class="unit">kWh / month</div>'+
      '</div>'+
      '<div class="pmrow">'+
        '<div class="pm minus" onclick="bump(-50)">&minus;</div>'+
        '<div class="pm plus" onclick="bump(50)">+</div>'+
      '</div>'+
    '</div>'+
    '<div class="hint">Average US apartment is ~850\u2013950 kWh/mo</div>'+
    '<div class="readout">'+
      '<div class="rrow"><span class="k">Battery installed</span><span class="v c">13 kWh Gotion HOME</span></div>'+
      '<div class="divider"></div>'+
      '<div class="rrow"><span class="k">Excess capacity to monetize</span><span class="v g" id="exVal">'+Math.round(c.excess)+' kWh/mo</span></div>'+
    '</div>'+
  '</div>';
}

function bump(d){
  STATE.kwh = Math.max(200, Math.min(3000, STATE.kwh + d));
  var v=document.getElementById("kwhVal"); if(v)v.innerHTML=STATE.kwh;
  var e=document.getElementById("exVal"); if(e)e.innerHTML=Math.round(calc().excess)+" kWh/mo";
}

function stepNode(){
  var attached = STATE.attached;
  return ''+
  '<div class="card">'+
    '<div class="step-tag">Step 2 of 4</div>'+
    '<h1>Attach the AI node</h1>'+
    '<p class="lead">An Armada edge GPU node clips onto your battery. It reads the excess power your battery isn\u2019t using and turns those spare kWh into sellable AI compute.</p>'+
    '<div class="flow">'+
      '<div class="node b"><div class="ico">\uD83D\uDD0B</div><div><div class="nm">13 kWh Battery</div><div class="ds">Behind your meter &middot; '+STATE.kwh+' kWh/mo profile</div></div></div>'+
      '<div class="link '+(attached?'pulse':'')+'"></div>'+
      '<div class="node a"><div class="ico">\uD83E\uDDE0</div><div><div class="nm">Armada AI Node <span class="badge '+(attached?'live':'wait')+'">'+(attached?'CONNECTED':'IDLE')+'</span></div><div class="ds">Reads excess power &middot; runs AI inference</div></div></div>'+
    '</div>'+
    (attached
      ? '<div class="readout"><div class="rrow"><span class="k">Node status</span><span class="v g">Reading '+Math.round(calc().excess)+' kWh excess</span></div><div class="rrow"><span class="k">Ready to sell compute</span><span class="v c">Yes \u2192</span></div></div>'
      : '<button class="btn grn attach-btn" style="width:100%" onclick="attach()">Attach &amp; Connect Node</button>')+
  '</div>';
}

function attach(){
  STATE.attached=true;
  renderStep();
  // enable next
  var nx=document.getElementById("nextBtn"); if(nx)nx.disabled=false;
}

function stepMarket(){
  var c=calc();
  var rows="";
  var shown = Math.min(STATE.marketTicks, BUYERS.length);
  var sum=0;
  for(var i=0;i<shown;i++){
    sum += BUYERS[i][1];
    rows += '<div class="row"><span class="buyer">'+BUYERS[i][0]+'</span><span class="amt">+'+usd(BUYERS[i][1])+'</span></div>';
  }
  if(shown===0) rows='<div class="row"><span class="buyer" style="color:var(--dim)">Connecting to marketplace\u2026</span><span class="amt"></span></div>';
  return ''+
  '<div class="card">'+
    '<div class="step-tag">Step 3 of 4</div>'+
    '<h1>Sell to the compute marketplace</h1>'+
    '<p class="lead">Your node lists its spare GPU power on the Armada Bridge marketplace. AI companies buy it in real time \u2014 each job pays into your account.</p>'+
    '<div class="mkt">'+
      '<div class="head"><span>ARMADA BRIDGE &middot; LIVE ORDERS</span><span class="badge live">SELLING</span></div>'+
      rows+
    '</div>'+
    '<button class="btn grn" style="width:100%;margin-top:14px" onclick="tick()">'+(shown<BUYERS.length?'Fill next order':'Marketplace synced \u2713')+'</button>'+
    '<div class="est">Compute revenue this month so far: <strong style="color:var(--grn)">'+usd(sum + c.compute*0)+'</strong> &middot; projected '+usd(c.compute)+'/mo</div>'+
  '</div>';
}

function tick(){
  if(STATE.marketTicks < BUYERS.length){ STATE.marketTicks++; renderStep(); }
}

function stepACH(){
  var c=calc();
  return ''+
  '<div class="card">'+
    '<div class="step-tag">Step 4 of 4</div>'+
    '<h1>You get paid</h1>'+
    '<p class="lead">At the end of each cycle, energy and compute earnings settle and deposit straight to your bank by ACH.</p>'+
    '<div class="readout">'+
      '<div class="rrow"><span class="k">Energy arbitrage</span><span class="v g">'+usd(c.energyArb)+'</span></div>'+
      '<div class="rrow"><span class="k">VPP grid payment</span><span class="v c">'+usd(c.vpp)+'</span></div>'+
      '<div class="rrow"><span class="k">AI compute sales</span><span class="v a">'+usd(c.compute)+'</span></div>'+
      '<div class="divider"></div>'+
      '<div class="rrow"><span class="k" style="font-weight:700;color:var(--ink)">Monthly total</span><span class="v g" style="font-size:16px">'+usd(c.total)+'</span></div>'+
    '</div>'+
    '<div class="ach">'+
      '<div class="chk">\u2713</div>'+
      '<div class="big">'+usd(c.total)+'</div>'+
      '<div class="to">deposited to your account</div>'+
      '<div class="bank">'+
        '<div><div class="bk">Your Bank &middot;\u2022\u2022\u2022\u2022 4417</div><div class="ac">ACH direct deposit</div></div>'+
        '<div class="badge live">SETTLED</div>'+
      '</div>'+
      '<div class="st">\u2248 '+usd0(c.total*12)+' / year &middot; auto-deposited monthly</div>'+
    '</div>'+
  '</div>';
}

function renderStep(){
  renderProgress();
  var s=document.getElementById("stage");
  var html="";
  if(STATE.step===0)html=stepMeter();
  else if(STATE.step===1)html=stepNode();
  else if(STATE.step===2)html=stepMarket();
  else html=stepACH();
  s.innerHTML=html;
  renderNav();
}

function renderNav(){
  var n=document.getElementById("nav"); n.innerHTML="";
  if(STATE.step>0){
    n.appendChild(el('<button class="btn ghost" onclick="prev()">Back</button>'));
  }
  var last = STATE.step===3;
  var label = last ? "Start Over" : "Continue";
  var b=el('<button class="btn primary" id="nextBtn" onclick="next()">'+label+'</button>');
  // gate step 2 until node attached
  if(STATE.step===1 && !STATE.attached){ b.disabled=true; }
  n.appendChild(b);
}

function next(){
  if(STATE.step===3){ // restart
    STATE.step=0; STATE.attached=false; STATE.marketTicks=0;
  } else {
    if(STATE.step===1 && !STATE.attached) return;
    STATE.step++;
    if(STATE.step===2){ STATE.marketTicks=0; }
  }
  renderStep();
  window.scrollTo(0,0);
}
function prev(){ if(STATE.step>0){STATE.step--; renderStep(); window.scrollTo(0,0);} }

renderStep();
</script>
</body>
</html>
